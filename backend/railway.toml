# Railway shared build configuration
#
# IMPORTANT: startCommand and healthcheckPath are intentionally absent.
#
# Railway's startCommand in railway.toml is absolute — it overrides the
# per-service "Start Command" set in the dashboard. Because both the web
# service and the worker service share this file, putting any startCommand
# here forces BOTH services to run the same process.
#
# Instead, each service declares its own start command in the Railway dashboard:
#
#   nethra-web    Start Command : sh -c "./start.sh"
#                 Health Check  : /health
#
#   nethra-worker Start Command : sh -c "./start-worker.sh"
#                 Health Check  : (empty — Celery has no HTTP server)
#
# Railway respects the dashboard values when this file is silent about them.

[build]
builder = "docker"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
