<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a" />
      <stop offset="100%" stop-color="#07070c" />
    </linearGradient>
  </defs>
  <!-- Outer Rounded Square with Gradient Border -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" stroke="url(#grad)" stroke-width="3" />
  
  <!-- Glowing 'N' Brand Mark -->
  <path d="M 21,44 V 20 L 43,44 V 20" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
